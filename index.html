<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Haotao TAN, East China University of Science and Technology">
    <meta property="og:title" content="Haotao TAN">
    <meta property="og:description" content="Haotao TAN, East China University of Science and Technology">
    <meta property="og:url" content="https://tanyrbs.github.io/">
    <meta property="og:site_name" content="Haotao TAN">
    <meta property="og:type" content="website">
    <meta name="twitter:title" content="Haotao TAN">
    <meta name="twitter:description" content="Haotao TAN, East China University of Science and Technology">
    <link rel="canonical" href="https://tanyrbs.github.io/">
    <link rel="alternate" type="application/rss+xml" href="https://tanyrbs.github.io/index.xml">
    <link rel="shortcut icon" href="/favicon.ico">
    <title>Haotao TAN</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f5f1;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #5f6b76;
        --line: #d8ded8;
        --accent: #2f6f5e;
        --accent-dark: #244d43;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      .profile {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 36px;
        align-items: center;
        padding: 36px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 16px 40px rgba(31, 41, 55, 0.08);
      }

      .avatar {
        width: 180px;
        height: 180px;
        border-radius: 8px;
        object-fit: cover;
        border: 1px solid var(--line);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 40px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .affiliation {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 18px;
      }

      dl {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 10px 16px;
        margin: 0;
      }

      dt {
        color: var(--muted);
        font-weight: 700;
      }

      dd {
        margin: 0;
      }

      a {
        color: var(--accent);
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }

      a:hover {
        color: var(--accent-dark);
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      nav a {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 7px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fbfbf9;
        color: var(--text);
        text-decoration: none;
        font-weight: 600;
      }

      footer {
        margin-top: 24px;
        color: var(--muted);
        font-size: 14px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111614;
          --panel: #18201d;
          --text: #eff4f1;
          --muted: #b4beb8;
          --line: #33423b;
          --accent: #8bc6b2;
          --accent-dark: #b8dece;
        }

        nav a {
          background: #1d2824;
        }
      }

      @media (max-width: 680px) {
        main {
          padding: 28px 0;
        }

        .profile {
          grid-template-columns: 1fr;
          padding: 24px;
          gap: 24px;
        }

        .avatar {
          width: 140px;
          height: 140px;
        }

        h1 {
          font-size: 32px;
        }

        dl {
          grid-template-columns: 1fr;
          gap: 4px 0;
        }

        dd {
          margin-bottom: 10px;
          overflow-wrap: anywhere;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="profile" aria-label="Profile">
        <img class="avatar" src="/img/avatar_hu11966206482947421333.JPG" width="300" height="273" alt="Haotao TAN">
        <div>
          <h1>Haotao TAN</h1>
          <p class="affiliation">East China University of Science and Technology</p>
          <dl>
            <dt>Email</dt>
            <dd><a href="mailto:19003279@mail.ecust.edu.cn">19003279@mail.ecust.edu.cn</a></dd>
            <dt>School</dt>
            <dd>East China University of Science and Technology</dd>
            <dt>GitHub</dt>
            <dd><a href="https://github.com/tanyrbs" rel="me">github.com/tanyrbs</a></dd>
          </dl>
          <nav aria-label="Site navigation">
            <a href="/">Home</a>
            <a href="/%E5%85%B3%E4%BA%8E/">About</a>
            <a href="/en/">English</a>
          </nav>
        </div>
      </section>
      <footer>&copy; 2026 Haotao TAN</footer>
    </main>
  </body>
</html>
